name: Clean & Filter IP List (Best 10 by Speed or Random 8)

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  filter-ip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 下载并智能优选 IP（按网段排除）
        run: |
          echo "🚀 开始下载所有 IP 来源..."

          curl -s -f -L https://raw.githubusercontent.com/chris202010/yxip/refs/heads/main/ip.txt -o raw1.txt || true
          curl -s -f -L https://raw.githubusercontent.com/zhangtaile/bestIP/refs/heads/main/ipinfo.txt -o raw2.txt || true
          curl -s -f -L https://raw.githubusercontent.com/Fido6/bestip/refs/heads/dtaa/bestiphk.txt -o raw3.txt || true

          echo "🔍 提取 IP 并解析延迟..."

          # ==================== 可维护的排除网段列表 ====================
          cat > exclude_segments.txt << 'EOF'
1.
3.
13.
103.
123.
129.
175.
EOF
          echo "📋 当前排除的网段："
          cat exclude_segments.txt
          # ============================================================

          > all_with_speed.txt

          for file in raw*.txt; do
            [ ! -s "$file" ] && continue

            awk '
              BEGIN { 
                FS = "#"; OFS = "#" 
                # 读取排除网段列表
                while ((getline seg < "exclude_segments.txt") > 0) {
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", seg)
                  if (seg != "") exclude[seg] = 1
                }
                close("exclude_segments.txt")
              }
              {
                gsub(/^[[:space:]]+|[[:space:]]+$/, "")
                if (NF == 0 || $0 == "") next

                ip_port = $1
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", ip_port)

                # 检查是否匹配任何排除网段
                exclude_flag = 0
                for (seg in exclude) {
                  if (ip_port ~ ("^" seg)) {
                    exclude_flag = 1
                    break
                  }
                }
                if (exclude_flag) next

                # 提取地区
                region_part = (NF >= 2) ? $2 : ""
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", region_part)
                gsub(/\|.*/, "", region_part)
                gsub(/[-0-9]+$/, "", region_part)
                gsub(/[[:space:]].*$/, "", region_part)
                region = toupper(region_part)

                if (region !~ /^(JP|KR|SG|US)$/) next

                # 智能提取延迟
                speed = 9999
                match($0, /([0-9]+\.?[0-9]*)[[:space:]]*(ms|毫秒)/)
                if (RSTART > 0) {
                  speed = substr($0, RSTART, RLENGTH-3) + 0
                } else {
                  match($0, /[0-9]+\.?[0-9]*[[:space:]]*ms/)
                  if (RSTART > 0) {
                    speed_str = substr($0, RSTART, RLENGTH)
                    gsub(/[^0-9.]/, "", speed_str)
                    speed = speed_str + 0
                  }
                }

                print ip_port "#" region "#" speed
              }
            ' "$file" >> all_with_speed.txt
          done

          # 全局去重，保留最优延迟
          echo "🔄 去重并保留最优延迟..."
          sort -t'#' -k1,1 -k3,3n all_with_speed.txt | awk -F'#' '!seen[$1]++' > deduped.txt

          echo "🎯 按地区智能优选 IP..."
          mkdir -p best-ips
          > best-ips/clean-ip.txt

          total=0
          for country in JP KR SG US; do
            grep "#$country#" deduped.txt > "${country}.txt" 2>/dev/null || true
            lines=$(wc -l < "${country}.txt" 2>/dev/null || echo 0)
            echo "📊 $country: 找到 $lines 个可用 IP"

            if [[ $lines -gt 0 ]]; then
              has_speed=$(awk -F'#' '$3 < 9999' "${country}.txt" | wc -l)

              if [[ $has_speed -gt 0 ]]; then
                sort -t'#' -k3,3n "${country}.txt" | head -n 10 >> best-ips/clean-ip.txt
                taken=10
                echo " → 有测速数据，取最快 10 个"
              else
                if [[ $lines -le 8 ]]; then
                  cat "${country}.txt" >> best-ips/clean-ip.txt
                  taken=$lines
                  echo " → 无测速数据，全部保留 $taken 个"
                else
                  shuf -n 8 "${country}.txt" >> best-ips/clean-ip.txt
                  taken=8
                  echo " → 无测速数据，随机抽取 8 个"
                fi
              fi
              total=$((total + taken))
            else
              echo " → 该地区暂无可用 IP"
            fi
          done

          # 最终格式清理
          awk -F'#' '{print $1 "#" $2}' best-ips/clean-ip.txt > best-ips/clean-ip.txt.tmp
          mv best-ips/clean-ip.txt.tmp best-ips/clean-ip.txt

          echo "✅ 完成！最终共 $total 个 IP"
          echo "📋 当前排除的网段："
          cat exclude_segments.txt
          echo "📋 最终列表预览："
          cat best-ips/clean-ip.txt

          rm -f raw*.txt *.txt exclude_segments.txt 2>/dev/null || true

      - name: 提交并推送 best-ips/clean-ip.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add best-ips/clean-ip.txt

          if git diff --staged --quiet; then
            echo "📌 文件无变化，跳过提交。"
          else
            git commit -m "chore: update best-ips/clean-ip.txt (excluded 1. 3. 13. 103. 123. 129. 175.) $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "🎉 best-ips/clean-ip.txt 已更新并推送！"
          fi

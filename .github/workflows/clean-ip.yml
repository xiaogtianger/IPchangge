name: Clean & Filter IP List (Best 5 by Speed + Random 3 if no speed)

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  filter-ip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 下载并智能优选 IP（有延迟取5个，无延迟随机3个）
        run: |
          echo "🚀 开始下载所有 IP 来源..."

          curl -s -f -L https://raw.githubusercontent.com/chris202010/yxip/refs/heads/main/ip.txt -o raw1.txt || true
          curl -s -f -L https://raw.githubusercontent.com/zhangtaile/bestIP/refs/heads/main/ipinfo.txt -o raw2.txt || true
          curl -s -f -L https://raw.githubusercontent.com/Fido6/bestip/refs/heads/dtaa/bestiphk.txt -o raw3.txt || true

          echo "🔍 提取 IP 并解析延迟..."

          > all_with_speed.txt

          for file in raw*.txt; do
            [ ! -s "$file" ] && continue
            awk '
              BEGIN { FS = "#"; OFS = "#" }
              {
                gsub(/^[[:space:]]+|[[:space:]]+$/, "")
                if (NF == 0 || $0 == "") next

                ip_port = $1
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", ip_port)

                region_part = (NF >= 2) ? $2 : ""
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", region_part)
                gsub(/\|.*/, "", region_part)
                gsub(/-[0-9]+$/, "", region_part)

                region = toupper(region_part)
                if (region !~ /^(JP|KR|SG|HK|US)$/) next

                # 智能提取延迟
                speed = 9999
                match($0, /([0-9]+\.?[0-9]*)[[:space:]]*(ms|毫秒)/)
                if (RSTART > 0) {
                  speed = substr($0, RSTART, RLENGTH-2) + 0
                } else {
                  match($0, /[0-9]+\.?[0-9]*[[:space:]]*ms/)
                  if (RSTART > 0) speed = substr($0, RSTART, RLENGTH-2) + 0
                }

                print ip_port "#" region "#" speed
              }
            ' "$file" >> all_with_speed.txt
          done

          # 全局去重，保留最优延迟
          sort -t'#' -k1,1 -k3,3n all_with_speed.txt | awk -F'#' '!seen[$1]++' > deduped.txt

          echo "🎯 按国家智能优选 IP..."

          mkdir -p best-ips
          > best-ips/clean-ip.txt
          total=0

          for country in JP KR SG HK US; do
            grep "#$country#" deduped.txt > "${country}.txt" 2>/dev/null || true
            lines=$(wc -l < "${country}.txt" 2>/dev/null || echo 0)

            echo "📊 $country: 找到 $lines 个可用 IP"

            if [[ $lines -gt 0 ]]; then
              # 判断是否有真实延迟数据
              has_speed=$(awk -F'#' '$3 < 9999' "${country}.txt" | wc -l)

              if [[ $has_speed -gt 0 ]]; then
                # 有延迟 → 按速度排序取前5
                sort -t'#' -k3,3n "${country}.txt" | head -n 5 >> best-ips/clean-ip.txt
                taken=5
                echo "   → 有延迟数据，取最快 5 个"
              else
                # 无延迟 → 随机取3个
                if [[ $lines -le 3 ]]; then
                  cat "${country}.txt" >> best-ips/clean-ip.txt
                  taken=$lines
                  echo "   → 无延迟数据，全部保留 $taken 个"
                else
                  shuf -n 3 "${country}.txt" >> best-ips/clean-ip.txt
                  taken=3
                  echo "   → 无延迟数据，随机抽取 3 个"
                fi
              fi

              total=$((total + taken))
            else
              echo "   → 该国家暂无可用 IP"
            fi
          done

          # 清理最终格式
          awk -F'#' '{print $1 "#" $2}' best-ips/clean-ip.txt > best-ips/clean-ip.txt.tmp
          mv best-ips/clean-ip.txt.tmp best-ips/clean-ip.txt

          echo "✅ 完成！最终共 $total 个 IP"
          echo "📋 最终列表预览："
          cat best-ips/clean-ip.txt

          rm -f raw*.txt *.txt 2>/dev/null || true

      - name: 提交并推送 best-ips/clean-ip.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add best-ips/clean-ip.txt

          if git diff --staged --quiet; then
            echo "📌 文件无变化，跳过提交。"
          else
            git commit -m "chore: update best-ips/clean-ip.txt (smart 5 by speed or random 3) $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "🎉 best-ips/clean-ip.txt 已更新并推送！"
          fi

name: Clean & Filter IP List (Only HK JP KR SG)

on:
  schedule:
    - cron: '0 0 */3 * *'      # 每 3 天运行一次（UTC 0:00）
  workflow_dispatch:

jobs:
  filter-ip:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main                # 如是 master 分支请改为 master

      - name: 下载并过滤 IP（仅保留含 HK JP KR SG 的行）
        run: |
          echo "开始下载原始 IP 文件..."
          curl -s https://raw.githubusercontent.com/chris202010/yxip/refs/heads/main/ip.txt -o raw-ip.txt

          echo "开始清理并过滤（保留含 #HK #JP #KR #SG 的IP）..."

          > clean-ip.txt

          count=0
          while IFS= read -r line || [[ -n $line ]]; do
            line=$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [[ -z "$line" ]]; then
              continue
            fi

            # 提取 IP:端口 部分
            ip_port=$(echo "$line" | cut -d'#' -f1 | sed 's/[[:space:]]*$//')

            # 提取地区部分（支持 #HK-1#github、#JP-5#xxx、#KR 等格式）
            if [[ "$line" == *#* ]]; then
              region_part=$(echo "$line" | cut -d'#' -f2- | cut -d'|' -f1 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              # 取第一个 # 前的内容作为地区标识（如 HK-1、JP-20 等）
              region=$(echo "$region_part" | cut -d'#' -f1 | sed 's/[[:space:]]*$//')
            else
              region=""
            fi

            # 判断是否包含 HK、JP、KR、SG（不区分大小写）
            if [[ -n "$region" ]]; then
              region_upper=$(echo "$region" | tr '[:lower:]' '[:upper:]')
              if [[ "$region_upper" == *"HK"* || "$region_upper" == *"JP"* || 
                    "$region_upper" == *"KR"* || "$region_upper" == *"SG"* ]]; then
                echo "${ip_port}#${region}" >> clean-ip.txt
                ((count++))
              fi
            fi
          done < raw-ip.txt

          echo "过滤完成！共保留 $count 行符合条件的 IP（含 HK/JP/KR/SG）。"
          echo "前 10 行预览："
          head -n 10 clean-ip.txt

      - name: 提交并推送清理后的文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add clean-ip.txt

          if git diff --staged --quiet; then
            echo "文件没有变化，跳过提交。"
          else
            git commit -m "chore: update clean-ip.txt (HK JP KR SG only) $(date +'%Y-%m-%d')"
            git push
            echo "✅ clean-ip.txt 已更新并推送！"
          fi

name: Clean & Filter IP List (Pure JP KR SG only - Daily)

on:
  schedule:
    - cron: '0 0 * * *'        # 每天 UTC 00:00 执行（北京时间早上 08:00）
  workflow_dispatch:           # 支持手动触发

jobs:
  filter-ip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 下载并生成最干净的 IP 列表（仅 JP KR SG）
        run: |
          echo "🔄 开始下载原始 IP 文件..."
          curl -s -f -L https://raw.githubusercontent.com/chris202010/yxip/refs/heads/main/ip.txt -o raw-ip.txt || { echo "❌ 下载失败"; exit 1; }

          echo "🧹 开始清理并过滤（仅保留纯 JP KR SG）..."

          > clean-ip.txt
          count=0
          declare -A seen   # 用于去重

          while IFS= read -r line || [[ -n $line ]]; do
            # 去除首尾空格
            line=$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [[ -z "$line" ]] && continue

            # 提取 IP:port 部分
            ip_port=$(echo "$line" | cut -d'#' -f1 | sed 's/[[:space:]]*$//')

            # 提取地区标识（第一个 # 后面的内容，去掉 -数字后缀，转大写）
            if [[ "$line" == *#* ]]; then
              region_part=$(echo "$line" | cut -d'#' -f2 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              region=$(echo "$region_part" | sed 's/-[0-9]*$//' | tr '[:lower:]' '[:upper:]' | sed 's/[[:space:]]*$//')
            else
              region=""
            fi

            # 只保留 JP、KR、SG
            if [[ "$region" == "JP" || "$region" == "KR" || "$region" == "SG" ]]; then
              # 去重
              if [[ -z "${seen[$ip_port]}" ]]; then
                seen[$ip_port]=1
                echo "${ip_port}#${region}" >> clean-ip.txt
                count=$((count + 1))
              fi
            fi
          done < raw-ip.txt

          # 按 JP → KR → SG 顺序排序，再按 IP 排序
          {
            grep '^.*#JP$' clean-ip.txt | sort -V || true
            grep '^.*#KR$' clean-ip.txt | sort -V || true
            grep '^.*#SG$' clean-ip.txt | sort -V || true
          } > clean-ip-sorted.txt

          mv clean-ip-sorted.txt clean-ip.txt

          echo "✅ 过滤完成！共保留 $count 行纯净 IP（仅 #JP #KR #SG，已去重并排序）。"
          echo "📊 前 15 行预览："
          if [[ -s clean-ip.txt ]]; then
            head -n 15 clean-ip.txt
          else
            echo "（暂无符合条件的 IP）"
          fi
          echo "总行数：$(wc -l < clean-ip.txt)"

      - name: 提交并推送 clean-ip.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add clean-ip.txt
          
          if git diff --staged --quiet; then
            echo "文件没有变化，跳过提交。"
          else
            git commit -m "chore: daily update clean-ip.txt (pure JP KR SG only) $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "🚀 clean-ip.txt 已成功更新并推送！"
          fi
